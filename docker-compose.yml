services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distsys-app
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - distsys-net

networks:
  distsys-net:
    driver: bridge
