services:
  postgres:
    image: postgres:16-alpine
    container_name: distsys-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=distsys
    ports:
      - "5432:5432"
    networks:
      - distsys-net
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distsys-app
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=distsys
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - distsys-net

networks:
  distsys-net:
    driver: bridge
